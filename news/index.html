<!DOCTYPE html>
<html>
<head>
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News — Adelina-Dora Mazilu</title>
  <link rel="stylesheet" href="/style.css">
  <script>
document.addEventListener('DOMContentLoaded', () => {
  const links = document.querySelectorAll('.site-nav a:not(.nav-brand)');
  const highlight = document.getElementById('navHighlight');
  const ul = document.querySelector('.site-nav ul');

  links.forEach(a => {
    const path = new URL(a.href).pathname;
    const here = location.pathname;
    const isHome = (here === '/' || here === '/index.html') && a.getAttribute('href') === '/index.html';
    const isMatch = here.startsWith(path) && a.getAttribute('href') !== '/index.html';
    if (isHome || isMatch) {
      a.classList.add('active');
      if (highlight && ul) {
        const ulRect = ul.getBoundingClientRect();
        const aRect = a.getBoundingClientRect();
        highlight.style.left = (aRect.left - ulRect.left) + 'px';
        highlight.style.width = aRect.width + 'px';
      }
    }
  });

  // also highlight active in mobile menu
  const mobileLinks = document.querySelectorAll('.nav-mobile-links a');
  mobileLinks.forEach(a => {
    const path = new URL(a.href).pathname;
    const here = location.pathname;
    const isHome = (here === '/' || here === '/index.html') && a.getAttribute('href') === '/index.html';
    const isMatch = here.startsWith(path) && a.getAttribute('href') !== '/index.html';
    if (isHome || isMatch) a.classList.add('active');
  });

  const hamburger = document.getElementById('navHamburger');
  const mobileMenu = document.getElementById('navMobileMenu');
  const closeBtn = document.getElementById('navMobileClose');

  if (hamburger) hamburger.addEventListener('click', () => mobileMenu.classList.add('open'));
  if (closeBtn) closeBtn.addEventListener('click', () => mobileMenu.classList.remove('open'));
});
</script>
</head>
<body>

  <!-- Snippet 1 goes here, at the top of <body> -->
  <nav class="site-nav">
    <a class="nav-brand" href="/index.html">Adelina Dora Mazilu</a>
    <ul>
      <div class="nav-highlight" id="navHighlight"></div>
      <li><a href="/index.html">Home</a></li>
      <li><a href="/projects/">Projects</a></li>
      <li><a href="/cv/">CV</a></li>
      <li><a href="/research/">Research Interests</a></li>
      <li><a href="/news/">News</a></li>
      <li><a href="/blog/">Blog</a></li>
      <li><a href="/ttdil/">Things to do in life</a></li>

    </ul>
<button class="nav-hamburger" id="navHamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="nav-mobile-menu" id="navMobileMenu">
    <div class="nav-mobile-header">
      <button class="nav-mobile-close" id="navMobileClose"></button>
      <a class="nav-mobile-brand" href="/index.html">Adelina Dora Mazilu</a>
    </div>
    <div class="nav-mobile-links">
      <a href="/index.html">Home</a>
      <a href="/projects/">Projects</a>
      <a href="/blog/">Blog</a>
      <a href="/cv/">CV</a>
      <a href="/research/">Research Interests</a>
      <a href="/ttdil/">Things to do in life</a>
      <a href="/news/">News</a>
    </div>
  </div>

  <!-- your page content below -->
<footer style="text-align: center; padding: 1rem; font-family: system-ui, sans-serif; font-size: 11px; color: #416082;">
  &copy; Adelina Mazilu. All rights reserved.
</footer>
</body>
</html>

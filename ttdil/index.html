<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Things to do in life — Adelina-Dora Mazilu</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .ttdil-intro {
      text-align: center;
      padding: 3rem 2rem 1rem;
      font-family: system-ui, sans-serif;
      font-size: 1.6rem;
      font-weight: 600;
      color: #fff;
      max-width: 800px;
      margin: 0 auto;
      line-height: 1.4;
    }
    .vine-container {
      position: relative;
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      padding-bottom: 6rem;
    }
    .vine-svg { width: 100%; display: block; }
    .goal-item {
      position: absolute;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 12px;
      font-family: system-ui, sans-serif;
      color: #fff;
    }
    .goal-text-block { display: flex; flex-direction: column; gap: 3px; }
    .goal-title { font-size: 1.1rem; font-weight: 700; color: #fff; }
    .goal-desc { font-size: 0.9rem; color: #8ab4d4; }
    .goal-checkbox {
      width: 36px;
      height: 36px;
      border: 3px solid #fff;
      border-radius: 6px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
    }
    .goal-checkbox.checked::after {
      content: '';
      display: block;
      width: 20px;
      height: 12px;
      border-left: 3px solid #fff;
      border-bottom: 3px solid #fff;
      transform: rotate(-45deg) translateY(-3px);
    }
  </style>
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const links = document.querySelectorAll('.site-nav a:not(.nav-brand)');
    const highlight = document.getElementById('navHighlight');
    const ul = document.querySelector('.site-nav ul');
    links.forEach(a => {
      const path = new URL(a.href).pathname;
      const here = location.pathname;
      const isHome = (here === '/' || here === '/index.html') && a.getAttribute('href') === '/index.html';
      const isMatch = here.startsWith(path) && a.getAttribute('href') !== '/index.html';
      if (isHome || isMatch) {
        a.classList.add('active');
        const ulRect = ul.getBoundingClientRect();
        const aRect = a.getBoundingClientRect();
        highlight.style.left = (aRect.left - ulRect.left) + 'px';
        highlight.style.width = aRect.width + 'px';
      }
    });
  });
  </script>
</head>
<body>

  <nav class="site-nav">
    <a class="nav-brand" href="/index.html">Adelina-Dora Mazilu</a>
    <ul>
      <div class="nav-highlight" id="navHighlight"></div>
      <li><a href="/index.html">Home</a></li>
      <li><a href="/projects/">Projects</a></li>
      <li><a href="/blog/">Blog</a></li>
      <li><a href="/cv/">CV</a></li>
      <li><a href="/research/">Research Interests</a></li>
      <li><a href="/ttdil/">Things to do in life</a></li>
      <li><a href="/news/">News</a></li>
    </ul>
  </nav>

  <div class="ttdil-intro">
    This is a list of things I would like to achieve during my lifetime
  </div>

  <div class="vine-container" id="vineContainer">
    <svg class="vine-svg" id="vineSvg" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <script>
    const goals = [
      { id: 1,  title: '#goal 1',  desc: 'a little bit of text about this', checked: true },
      { id: 2,  title: '#goal 2',  desc: 'a little bit of text about this', checked: false },
      { id: 3,  title: '#goal 3',  desc: 'a little bit of text about this', checked: true },
      { id: 4,  title: '#goal 4',  desc: 'a little bit of text about this', checked: false },
      { id: 5,  title: '#goal 5',  desc: 'a little bit of text about this', checked: true },
      { id: 6,  title: '#goal 6',  desc: 'a little bit of text about this', checked: false },
      { id: 7,  title: '#goal 7',  desc: 'a little bit of text about this', checked: true },
      { id: 8,  title: '#goal 8',  desc: 'a little bit of text about this', checked: false },
      { id: 9,  title: '#goal 9',  desc: 'a little bit of text about this', checked: true },
      { id: 10, title: '#goal 10', desc: 'a little bit of text about this', checked: false },
    ];

    const FLOWER_SIZE = 180;
    const STEP_Y = 300;
    const GAP = FLOWER_SIZE / 2 + 24;

    function build() {
      const container = document.getElementById('vineContainer');
      const svg = document.getElementById('vineSvg');
      const W = container.offsetWidth;
      const cx = W / 2;
      const totalH = goals.length * STEP_Y + 160;

      svg.setAttribute('viewBox', `0 0 ${W} ${totalH}`);
      svg.setAttribute('height', totalH);
      svg.style.height = totalH + 'px';
      svg.innerHTML = '';

      const branchPoints = goals.map((g, i) => {
        const side = i % 2 === 0 ? -1 : 1;
        const x = cx + side * (W * 0.26);
        const y = 120 + i * STEP_Y;
        return { x, y, side, goal: g };
      });

      // thick wavy main stem
      let pathD = `M ${cx} 0`;
      branchPoints.forEach((bp, i) => {
        const prevY = i === 0 ? 0 : branchPoints[i - 1].y;
        const wobble = (i % 2 === 0 ? -1 : 1) * 60;
        const cp1x = cx + wobble;
        const cp1y = prevY + (bp.y - prevY) * 0.3;
        const cp2x = cx - wobble * 0.8;
        const cp2y = prevY + (bp.y - prevY) * 0.7;
        pathD += ` C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${cx} ${bp.y}`;
      });
      const lastY = branchPoints[branchPoints.length - 1].y;
      pathD += ` C ${cx} ${lastY + 80}, ${cx} ${lastY + 130}, ${cx} ${totalH}`;

      const mainPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      mainPath.setAttribute('d', pathD);
      mainPath.setAttribute('stroke', '#ffffff');
      mainPath.setAttribute('stroke-width', '10');
      mainPath.setAttribute('fill', 'none');
      mainPath.setAttribute('stroke-linecap', 'round');
      svg.appendChild(mainPath);

      branchPoints.forEach(bp => {
        const flowerCX = bp.x;
        const flowerCY = bp.y;

        const cp1x = cx + bp.side * W * 0.07;
        const cp1y = bp.y + 40;
        const cp2x = cx + bp.side * W * 0.21;
        const cp2y = bp.y - 50;

        const branch = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        branch.setAttribute('d', `M ${cx} ${bp.y} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${flowerCX} ${flowerCY}`);
        branch.setAttribute('stroke', '#ffffff');
        branch.setAttribute('stroke-width', '5.5');
        branch.setAttribute('fill', 'none');
        branch.setAttribute('stroke-linecap', 'round');
        svg.appendChild(branch);

        const flower = document.createElementNS('http://www.w3.org/2000/svg', 'image');
        flower.setAttribute('href', '/ttdil/blue_flower.png');
        flower.setAttribute('x', flowerCX - FLOWER_SIZE / 2);
        flower.setAttribute('y', flowerCY - FLOWER_SIZE / 2);
        flower.setAttribute('width', FLOWER_SIZE);
        flower.setAttribute('height', FLOWER_SIZE);
        svg.appendChild(flower);
      });

      container.querySelectorAll('.goal-item').forEach(el => el.remove());

      branchPoints.forEach(bp => {
        const item = document.createElement('div');
        item.className = 'goal-item';

        const itemW = 180;

        if (bp.side === -1) {
          // left side: item starts at flower's left edge minus gap minus item width
          item.style.left = (bp.x - FLOWER_SIZE / 2 - GAP - itemW) + 'px';
        } else {
          // right side: item starts at flower's right edge plus gap
          item.style.left = (bp.x + FLOWER_SIZE / 2 + GAP) + 'px';
        }
        item.style.width = itemW + 'px';
        item.style.top = (bp.y - 22) + 'px';

        // checkbox always on the left
        const checkbox = document.createElement('div');
        checkbox.className = 'goal-checkbox' + (bp.goal.checked ? ' checked' : '');

        const textBlock = document.createElement('div');
        textBlock.className = 'goal-text-block';

        const title = document.createElement('div');
        title.className = 'goal-title';
        title.textContent = bp.goal.title;

        const desc = document.createElement('div');
        desc.className = 'goal-desc';
        desc.textContent = bp.goal.desc;

        textBlock.appendChild(title);
        textBlock.appendChild(desc);
        item.appendChild(checkbox);
        item.appendChild(textBlock);
        container.appendChild(item);
      });
    }

    build();
    window.addEventListener('resize', build);
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Things to do in life — Adelina-Dora Mazilu</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .ttdil-intro {
      text-align: center;
      padding: 3rem 2rem 0;
      font-family: system-ui, sans-serif;
      font-size: 1.6rem;
      font-weight: 600;
      color: #fff;
      max-width: 800px;
      margin: 0 auto;
      line-height: 1.4;
    }

    .stem-stack {
      position: relative;
      width: 100%;
      margin: 0 auto;
}
    .stem-section.constrained {
      width: 45%;
      margin-left: auto;
      margin-right: auto;
      position: relative;
      right: 2.5%;
    }

    .stem-section {
      position: relative;
      width: 100%;
    }
    .stem-section.top-section {
      width: 40%;
      left: -2.5%;
   }
    .stem-section img.stem-img {
      width: 100%;
      display: block;
    }

 .goal-overlay {
  position: absolute;
  display: flex;
  flex-direction: column;
  gap: 6px;
  font-family: system-ui, sans-serif;
  color: #fff;
  transform: translateY(-50%);
  white-space: normal;
}

.goal-header {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 10px;
}


    .goal-overlay.side-right {
      flex-direction: row;
    }

    .goal-overlay.side-left {
      flex-direction: row-reverse;
    }

    .goal-text-block {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

.goal-title {
  font-size: 1.25rem;
  font-weight: 700;
  color: #fff;
  text-shadow: 0 1px 6px #000a;
  line-height: 1.3;
}

.goal-desc {
  font-size: 1rem;
  color: #8ab4d4;
  text-shadow: 0 1px 4px #000a;
  line-height: 1.5;
  padding-left: 2px;
}

.goal-checkbox {
  width: 32px;
  height: 32px;
  border: 3px solid #fff;
  border-radius: 6px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.3);
}

.goal-checkbox.checked {
  background-color: #659fdf; /* The specific blue from your image */
  border-color: #659fdf;     /* Matches the border to the background */
}

.goal-checkbox.checked::after {
  content: '';
  display: block;
  /* Larger dimensions to fill the 32px box like in #3 */
  width: 20px; 
  height: 12px;
  
  /* Thick black "hollow" look (adjust to match your page background) */
  border-left: 6px solid #0b111b; 
  border-bottom: 6px solid #0b111b;
  
  /* Precise rotation and shift to center the thicker shape */
  transform: rotate(-45deg) translateY(-4px) translateX(1px);
}
@media (max-width: 768px) {
  .stem-stack { display: none; }

  .mobile-goals {
    display: block;
    padding: 1.5rem 1.5rem 4rem;
  }

  .mobile-goal-item {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 1rem 1.25rem;
    margin-bottom: 1rem;
    border: 1.5px solid #1a6fc4;
    border-radius: 12px;
    background: #0f1923;
    box-shadow: 0 0 16px #1a6fc433;
  }

  .mobile-goal-header {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .mobile-goal-title {
    font-family: system-ui, sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: #fff;
  }

  .mobile-goal-desc {
    font-family: system-ui, sans-serif;
    font-size: 0.85rem;
    color: #8ab4d4;
    line-height: 1.5;
  }

  .mobile-checkbox {
    width: 28px;
    height: 28px;
    border: 3px solid #fff;
    border-radius: 6px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.3);
  }

  .mobile-checkbox.checked {
    background-color: #659fdf;
    border-color: #659fdf;
  }

  .mobile-checkbox.checked::after {
    content: '';
    display: block;
    width: 16px;
    height: 9px;
    border-left: 4px solid #0b111b;
    border-bottom: 4px solid #0b111b;
    transform: rotate(-45deg) translateY(-3px);
  }
}
@media (max-width: 768px) {
  .stem-stack { display: none; }
  .mobile-goals { display: block !important; }
}

@media (min-width: 769px) {
  .mobile-goals { display: none !important; }
}

  </style>
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const links = document.querySelectorAll('.site-nav a:not(.nav-brand)');
    const highlight = document.getElementById('navHighlight');
    const ul = document.querySelector('.site-nav ul');
    links.forEach(a => {
      const path = new URL(a.href).pathname;
      const here = location.pathname;
      const isHome = (here === '/' || here === '/index.html') && a.getAttribute('href') === '/index.html';
      const isMatch = here.startsWith(path) && a.getAttribute('href') !== '/index.html';
      if (isHome || isMatch) {
        a.classList.add('active');
        const ulRect = ul.getBoundingClientRect();
        const aRect = a.getBoundingClientRect();
        highlight.style.left = (aRect.left - ulRect.left) + 'px';
        highlight.style.width = aRect.width + 'px';
      }
    });
  });
  const mobileGoals = document.getElementById('mobileGoals');
goals.forEach(g => {
  const item = document.createElement('div');
  item.className = 'mobile-goal-item';

  const header = document.createElement('div');
  header.className = 'mobile-goal-header';

  const checkbox = document.createElement('div');
  checkbox.className = 'mobile-checkbox' + (g.checked ? ' checked' : '');

  const title = document.createElement('div');
  title.className = 'mobile-goal-title';
  title.textContent = g.title;

  header.appendChild(checkbox);
  header.appendChild(title);

  const desc = document.createElement('div');
  desc.className = 'mobile-goal-desc';
  desc.textContent = g.desc;

  item.appendChild(header);
  item.appendChild(desc);
  mobileGoals.appendChild(item);
});
  </script>
</head>
<body>

  <nav class="site-nav">
    <a class="nav-brand" href="/index.html">Adelina-Dora Mazilu</a>
    <ul>
      <div class="nav-highlight" id="navHighlight"></div>
      <li><a href="/index.html">Home</a></li>
      <li><a href="/projects/">Projects</a></li>
      <li><a href="/blog/">Blog</a></li>
      <li><a href="/cv/">CV</a></li>
      <li><a href="/research/">Research Interests</a></li>
      <li><a href="/ttdil/">Things to do in life</a></li>
      <li><a href="/news/">News</a></li>
    </ul>
  </nav>

  <div class="ttdil-intro">
    This is a list of things I would like to achieve during my lifetime
  </div>

  <div class="stem-stack" id="stemStack"></div>
  <div class="mobile-goals" id="mobileGoals"></div>

  <script>
    const goals = [
      { id: 1,  title: '#goal 1',  desc: 'a little bit of text about this', checked: true },
      { id: 2,  title: '#goal 2',  desc: 'a little bit of text about this', checked: false },
      { id: 3,  title: '#goal 3',  desc: 'a little bit of text about this', checked: true },
      { id: 4,  title: '#goal 4',  desc: 'a little bit of text about this', checked: false },
      { id: 5,  title: '#goal 5',  desc: 'a little bit of text about this', checked: true },
      { id: 6,  title: '#goal 6',  desc: 'a little bit of text about this', checked: false },
      { id: 7,  title: '#goal 7',  desc: 'a little bit of text about this', checked: true },
      { id: 8,  title: '#goal 8',  desc: 'a little bit of text about this', checked: false },
      { id: 9,  title: '#goal 9',  desc: 'a little bit of text about this', checked: true },
      { id: 10, title: '#goal 10', desc: 'a little bit of text about this', checked: false },
    ];

    // flower positions as {top%, left%} within each image
    // side: 'right' = flower is on right side of stem, text goes further right
    //       'left'  = flower is on left side of stem, text goes further left
    const sections = [
      {
        img: '/ttdil/stem_top_full.png',
        overlap: 0,
        flowers: [
          { topPct: 53, leftPct: 85, side: 'right', goalIdx: 0 },
          { topPct: 75, leftPct: 14, side: 'left',  goalIdx: 1 },
        ]
      },
      {
        img: '/ttdil/stem_part_full.png',
        overlap: 190,
        flowers: [
          { topPct: 15, leftPct: 85, side: 'right', goalIdx: 2 },
          { topPct: 58, leftPct: 15, side: 'left',  goalIdx: 3 },
        ]
      },
      {
        img: '/ttdil/stem_part_full.png',
        overlap: 190,
        flowers: [
          { topPct: 15, leftPct: 85, side: 'right', goalIdx: 4 },
          { topPct: 58, leftPct: 15, side: 'left',  goalIdx: 5 },
        ]
      },
      {
        img: '/ttdil/stem_part_full.png',
        overlap: 190,
        flowers: [
          { topPct: 15, leftPct: 85, side: 'right', goalIdx: 6 },
          { topPct: 58, leftPct: 15, side: 'left',  goalIdx: 7 },
        ]
      },
      {
        img: '/ttdil/stem_bottom_full.png',
        overlap: 190,
        flowers: [
          { topPct: 12.5, leftPct: 62.5, side: 'right', goalIdx: 8 },
          { topPct: 56,   leftPct: 31,   side: 'left',  goalIdx: 9 },
        ]
      },
    ];

    const stack = document.getElementById('stemStack');

    sections.forEach((sec, si) => {
      const section = document.createElement('div');
      section.className = 'stem-section' + (si < sections.length - 1 ? ' constrained' : '') + (si === 0 ? ' top-section' : '');
      if (si > 0) {
        section.style.marginTop = `-${sec.overlap}px`;
      }

      const img = document.createElement('img');
      img.className = 'stem-img';
      img.src = sec.img;
      img.alt = '';
      section.appendChild(img);

      // place overlays after image loads so we know dimensions
      img.addEventListener('load', () => placeGoals(section, img, sec));
      // fallback in case already cached
      if (img.complete) placeGoals(section, img, sec);

      stack.appendChild(section);
    });

function placeGoals(section, img, sec) {
  section.querySelectorAll('.goal-overlay').forEach(el => el.remove());

  const imgH = img.offsetHeight;
  const imgW = img.offsetWidth;
  const screenW = window.innerWidth;

  sec.flowers.forEach(f => {
    const goal = goals[f.goalIdx];
    if (!goal) return;

    const overlay = document.createElement('div');
    overlay.className = 'goal-overlay';

    const topPx = (f.topPct / 100) * imgH;

    // get section's left offset relative to screen
    const sectionLeft = section.getBoundingClientRect().left;

    if (f.side === 'right') {
      // starts at 11% from left, ends at 32% from left
      overlay.style.left = (screenW * 0.11 - sectionLeft) + 'px';
      overlay.style.width = (screenW * (0.32 - 0.11)) + 'px';
    } else {
      // starts at 32% from right (= 68% from left), ends at 11% from right (= 89% from left)
      overlay.style.left = (screenW * 0.68 - sectionLeft) + 'px';
      overlay.style.width = (screenW * (0.89 - 0.68)) + 'px';
    }

    overlay.style.top = topPx + 'px';

    // header row: checkbox + title
    const header = document.createElement('div');
    header.className = 'goal-header';

    const checkbox = document.createElement('div');
    checkbox.className = 'goal-checkbox' + (goal.checked ? ' checked' : '');

    const title = document.createElement('div');
    title.className = 'goal-title';
    title.textContent = goal.title;

    header.appendChild(checkbox);
    header.appendChild(title);

    // description below
    const desc = document.createElement('div');
    desc.className = 'goal-desc';
    desc.textContent = goal.desc;

    overlay.appendChild(header);
    overlay.appendChild(desc);
    section.appendChild(overlay);
  });
}
    // re-place on resize
    window.addEventListener('resize', () => {
      document.querySelectorAll('.stem-section').forEach((section, si) => {
        const img = section.querySelector('img');
        const sec = sections[si];
        if (img && img.complete) placeGoals(section, img, sec);
      });
    });
  </script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Things to do in life — Adelina-Dora Mazilu</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .ttdil-intro {
      text-align: center;
      padding: 3rem 2rem 0;
      font-family: system-ui, sans-serif;
      font-size: 1.6rem;
      font-weight: 600;
      color: #fff;
      max-width: 800px;
      margin: 0 auto;
      line-height: 1.4;
    }

    .stem-stack {
      position: relative;
      width: 100%;
      margin: 0 auto;
    }

    .stem-section.constrained {
      width: 45%;
      margin-left: auto;
      margin-right: auto;
      position: relative;
      right: 2.5%;
    }

    .stem-section {
      position: relative;
      width: 100%;
    }

    .stem-section.top-section {
      width: 40%;
      left: -2.5%;
    }

    .stem-section img.stem-img {
      width: 100%;
      display: block;
    }

    .goal-overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-family: system-ui, sans-serif;
      color: #fff;
      transform: translateY(-50%);
      white-space: normal;
    }

    .goal-header {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;
    }

    .goal-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 6px #000a;
      line-height: 1.3;
    }

    .goal-desc {
      font-size: 1rem;
      color: #8ab4d4;
      text-shadow: 0 1px 4px #000a;
      line-height: 1.5;
      padding-left: 2px;
    }

    .goal-checkbox {
      width: 32px;
      height: 32px;
      border: 3px solid #fff;
      border-radius: 6px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.3);
    }

    .goal-checkbox.checked {
      background-color: #659fdf;
      border-color: #659fdf;
    }

    .goal-checkbox.checked::after {
      content: '';
      display: block;
      width: 20px;
      height: 12px;
      border-left: 6px solid #0b111b;
      border-bottom: 6px solid #0b111b;
      transform: rotate(-45deg) translateY(-4px) translateX(1px);
    }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      .stem-section.constrained {
        width: 80% !important;
        right: 0 !important;
        margin-left: auto !important;
        margin-right: auto !important;
      }

      .stem-section.top-section {
        width: 75% !important;
        left: 0 !important;
      }

      .goal-title { font-size: 0.8rem !important; }
      .goal-desc { font-size: 0.7rem !important; }

      .goal-checkbox {
        width: 22px !important;
        height: 22px !important;
      }

      .goal-checkbox.checked::after {
        width: 13px !important;
        height: 8px !important;
        border-left-width: 4px !important;
        border-bottom-width: 4px !important;
        transform: rotate(-45deg) translateY(-3px) translateX(1px) !important;
      }
      .stem-section:last-child {
        overflow: hidden;
      }
      .stem-section:last-child img.stem-img {
        width: 100% !important;
        height: auto !important;
        object-fit: cover !important;
        object-position: center !important;
      }
    }
  </style>

  <!-- NAV SCRIPT — goes in head -->
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const links = document.querySelectorAll('.site-nav a:not(.nav-brand)');
    const highlight = document.getElementById('navHighlight');
    const ul = document.querySelector('.site-nav ul');
    links.forEach(a => {
      const path = new URL(a.href).pathname;
      const here = location.pathname;
      const isHome = (here === '/' || here === '/index.html') && a.getAttribute('href') === '/index.html';
      const isMatch = here.startsWith(path) && a.getAttribute('href') !== '/index.html';
      if (isHome || isMatch) {
        a.classList.add('active');
        const ulRect = ul.getBoundingClientRect();
        const aRect = a.getBoundingClientRect();
        highlight.style.left = (aRect.left - ulRect.left) + 'px';
        highlight.style.width = aRect.width + 'px';
      }
    });
  });
  </script>
</head>
<body>

  <nav class="site-nav">
    <a class="nav-brand" href="/index.html">Adelina-Dora Mazilu</a>
    <ul>
      <div class="nav-highlight" id="navHighlight"></div>
      <li><a href="/index.html">Home</a></li>
      <li><a href="/projects/">Projects</a></li>
      <li><a href="/blog/">Blog</a></li>
      <li><a href="/cv/">CV</a></li>
      <li><a href="/research/">Research Interests</a></li>
      <li><a href="/ttdil/">Things to do in life</a></li>
      <li><a href="/news/">News</a></li>
    </ul>
  </nav>

  <div class="ttdil-intro">
    This is a list of things I would like to achieve during my lifetime
  </div>

  <div class="stem-stack" id="stemStack"></div>

  <!-- MAIN PAGE SCRIPT — goes in body after the HTML -->
  <script>
    const goals = [
      { id: 1,  title: '#goal 1',  desc: 'a little bit of text about this', checked: true },
      { id: 2,  title: '#goal 2',  desc: 'a little bit of text about this', checked: false },
      { id: 3,  title: '#goal 3',  desc: 'a little bit of text about this', checked: true },
      { id: 4,  title: '#goal 4',  desc: 'a little bit of text about this', checked: false },
      { id: 5,  title: '#goal 5',  desc: 'a little bit of text about this', checked: true },
      { id: 6,  title: '#goal 6',  desc: 'a little bit of text about this', checked: false },
      { id: 7,  title: '#goal 7',  desc: 'a little bit of text about this', checked: true },
      { id: 8,  title: '#goal 8',  desc: 'a little bit of text about this', checked: false },
      { id: 9,  title: '#goal 9',  desc: 'a little bit of text about this', checked: true },
      { id: 10, title: '#goal 10', desc: 'a little bit of text about this', checked: false },
    ];

    const sections = [
      {
        img: '/ttdil/stem_top_full.png',
        overlap: 0,
        flowers: [
          { topPct: 53, leftPct: 85, side: 'right', goalIdx: 0 },
          { topPct: 75, leftPct: 14, side: 'left',  goalIdx: 1 },
        ]
      },
      {
        img: '/ttdil/stem_part_full.png',
        overlap: 190,
        flowers: [
          { topPct: 15, leftPct: 85, side: 'right', goalIdx: 2 },
          { topPct: 58, leftPct: 15, side: 'left',  goalIdx: 3 },
        ]
      },
      {
        img: '/ttdil/stem_part_full.png',
        overlap: 190,
        flowers: [
          { topPct: 15, leftPct: 85, side: 'right', goalIdx: 4 },
          { topPct: 58, leftPct: 15, side: 'left',  goalIdx: 5 },
        ]
      },
      {
        img: '/ttdil/stem_part_full.png',
        overlap: 190,
        flowers: [
          { topPct: 15, leftPct: 85, side: 'right', goalIdx: 6 },
          { topPct: 58, leftPct: 15, side: 'left',  goalIdx: 7 },
        ]
      },
      {
        img: '/ttdil/stem_bottom_full.png',
        overlap: 190,
        flowers: [
          { topPct: 12.5, leftPct: 62.5, side: 'right', goalIdx: 8 },
          { topPct: 56,   leftPct: 31,   side: 'left',  goalIdx: 9 },
        ]
      },
    ];

    const stack = document.getElementById('stemStack');

    sections.forEach((sec, si) => {
      const section = document.createElement('div');
      section.className = 'stem-section'
        + (si < sections.length - 1 ? ' constrained' : '')
        + (si === 0 ? ' top-section' : '');

      if (si > 0) {
        const isMobile = window.innerWidth <= 768;
        section.style.marginTop = `-${isMobile ? 80 : sec.overlap}px`;
      } 

      const img = document.createElement('img');
      img.className = 'stem-img';
      img.src = sec.img;
      img.alt = '';
      section.appendChild(img);

      img.addEventListener('load', () => placeGoals(section, img, sec));
      if (img.complete) placeGoals(section, img, sec);

      stack.appendChild(section);
    });

    function placeGoals(section, img, sec) {
      section.querySelectorAll('.goal-overlay').forEach(el => el.remove());

      const imgH = img.offsetHeight;
      const screenW = window.innerWidth;
      const isMobile = screenW <= 768;
      const sectionLeft = section.getBoundingClientRect().left;

      sec.flowers.forEach(f => {
        const goal = goals[f.goalIdx];
        if (!goal) return;

        const overlay = document.createElement('div');
        overlay.className = 'goal-overlay';

        const topPx = (f.topPct / 100) * imgH;
        overlay.style.top = topPx + 'px';

        if (f.side === 'right') {
          overlay.style.left = (screenW * (isMobile ? 0.05 : 0.11) - sectionLeft) + 'px';
          overlay.style.width = (screenW * (isMobile ? 0.18 : 0.21)) + 'px';
        } else {
          overlay.style.left = (screenW * (isMobile ? 0.66 : 0.68) - sectionLeft) + 'px';
          overlay.style.width = (screenW * (isMobile ? 0.18 : 0.21)) + 'px';
        }

        const header = document.createElement('div');
        header.className = 'goal-header';

        const checkbox = document.createElement('div');
        checkbox.className = 'goal-checkbox' + (goal.checked ? ' checked' : '');

        const title = document.createElement('div');
        title.className = 'goal-title';
        title.textContent = goal.title;

        header.appendChild(checkbox);
        header.appendChild(title);

        const desc = document.createElement('div');
        desc.className = 'goal-desc';
        desc.textContent = goal.desc;

        overlay.appendChild(header);
        overlay.appendChild(desc);
        section.appendChild(overlay);
      });
    }

    window.addEventListener('resize', () => {
      document.querySelectorAll('.stem-section').forEach((section, si) => {
        const img = section.querySelector('img');
        const sec = sections[si];
        if (img && img.complete) placeGoals(section, img, sec);
      });
    });
  </script>

  <footer style="position: fixed; bottom: 0; left: 0; width: 100%; text-align: center; padding: 0.4rem; font-family: system-ui, sans-serif; font-size: 11px; color: #3a5068;">
    &copy; Adelina Mazilu. All rights reserved.
  </footer>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adelina-Dora Mazilu</title>
  <link rel="stylesheet" href="/style.css">
  <script>
  document.addEventListener('DOMContentLoaded', () => {
  const links = document.querySelectorAll('.site-nav a:not(.nav-brand)');
  const highlight = document.getElementById('navHighlight');
  const ul = document.querySelector('.site-nav ul');

  links.forEach(a => {
    const path = new URL(a.href).pathname;
    const here = location.pathname;
    const isHome = (here === '/' || here === '/index.html') && a.getAttribute('href') === '/index.html';
    const isMatch = here.startsWith(path) && a.getAttribute('href') !== '/index.html';
    if (isHome || isMatch) {
      a.classList.add('active');
      const ulRect = ul.getBoundingClientRect();
      const aRect = a.getBoundingClientRect();
      highlight.style.left = (aRect.left - ulRect.left) + 'px';
      highlight.style.width = aRect.width + 'px';
    }
  });
});
</script>
</head>
<body>

  <nav class="site-nav">
  <a class="nav-brand" href="/index.html">Adelina-Dora Mazilu</a>
  <ul>
    <div class="nav-highlight" id="navHighlight"></div>
    <li><a href="/index.html">Home</a></li>
    <li><a href="/projects/">Projects</a></li>
    <li><a href="/blog/">Blog</a></li>
    <li><a href="/cv/">CV</a></li>
    <li><a href="/research/">Research Interests</a></li>
    <li><a href="/ttdil/">Things to do in life</a></li>
    <li><a href="/news/">News</a></li>
  </ul>
  </nav>

<div style="display:flex; align-items:center; gap:4rem; padding: 4rem 3rem; max-width:900px; margin:0 auto;">

  <div style="flex:1; min-width:0;">
    <h1 style="color:#fff; font-size:2.2rem; font-weight:600; margin:0 0 1rem; line-height:1.2;">About Me</h1>
    <p style="color:#8a9bb0; font-size:1rem; line-height:1.8; margin:0;">I am a BSc of Artificial Intelligence student at the University of Groningen</p>
  </div>

  <div style="flex-shrink:0; width:280px; height:280px; perspective:1000px; cursor:pointer;" class="flip-wrap">
    <div class="flip-inner" style="width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.8s cubic-bezier(.4,0,.2,1);">
      <div style="position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:50%;overflow:hidden;box-shadow:0 0 40px #ffffff33, 0 0 80px #ffffff18;">
        <img src="/index_photo.jpg" style="width:100%;height:100%;object-fit:cover;display:block;">
      </div>
      <div style="position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:50%;overflow:hidden;transform:rotateY(180deg);box-shadow:0 0 40px #c8e0ff55, 0 0 80px #7ab8ff22;">
        <img src="/moon.jpg" style="width:100%;height:100%;object-fit:cover;display:block;">
      </div>
    </div>
  </div>

</div>

<style>
.flip-wrap:hover .flip-inner { transform: rotateY(180deg); }
</style>

</body>
</html>
